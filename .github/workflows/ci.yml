name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke-check Python scripts
        run: |
          python -m py_compile github_good_first_issue_finder.py scripts/*.py
          python github_good_first_issue_finder.py --help >/dev/null
          python scripts/build_standalone.py --help >/dev/null
          python scripts/update_readme_timestamp.py --help >/dev/null

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Typecheck frontend
        run: |
          cd frontend
          npm run typecheck

      - name: Build frontend
        run: |
          cd frontend
          npm run build
